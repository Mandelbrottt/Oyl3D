name: Build Oyl3D

on:
  push:
    paths: &paths-to-watch
      - 'Source/Oyl3D/**'
      - 'Source/Premake/**'
      - 'premake5.lua'
      - 'Packages.lua'
      - '.github/workflows/build-oyl3d.yml'
  pull_request:
    branches: ["main"]
    paths: *paths-to-watch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ACT: ''
  visual_studio_version: vs2022
  solution_file_path: Source/Oyl3D/Oyl3D.sln
  premake_version: "5.0.0-beta8"
  vulkan_sdk_version: 1.4.341.1

jobs:
  win64-clang:
    name: Clang Oyl3D ${{ matrix.platform }} in ${{ matrix.configuration }}
    runs-on: windows-latest
    strategy: &build-strategy
      fail-fast: false
      matrix:
        configuration: [Debug, Development, Distribution, Profile]
        platform: [Editor, Standalone]
        exclude:
          - configuration: Distribution
            platform: Editor
    env:
      toolset: clang
    steps: &win64-build-steps
      - uses: actions/checkout@v6

      - name: Setup Premake
        if: ${{ !env.ACT }}
        uses: abel0b/setup-premake@v2.4
        with:
          version: ${{ env.premake_version }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # https://github.com/actions/cache/blob/main/workarounds.md#improving-cache-restore-performance-on-windowsusing-cross-os-caching
      - if: ${{ runner.os == 'Windows' }}
        name: Use GNU tar
        shell: cmd
        run: |
          echo "Adding GNU tar to PATH"
          echo C:\Program Files\Git\usr\bin>>"%GITHUB_PATH%"

      - name: Fetch Vulkan SDK version spec
        if: ${{ !env.ACT }}
        run: |
          Invoke-WebRequest -Uri "https://vulkan.lunarg.com/sdk/config/${{ env.vulkan_sdk_version }}/windows/config.json" -OutFile vulkan-sdk-config.json
          $vulkan_sdk_config = "${{ github.workspace }}/vulkan-sdk-config.json" -replace '\\', '/'
          Add-Content -Path "$env:GITHUB_ENV" -Value "vulkan_sdk_config=$vulkan_sdk_config"

      - name: Prepare Vulkan SDK
        if: ${{ !env.ACT }}
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-config-file: $vulkan_sdk_config
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Cache Packages
        id: restore-cache-packages
        uses: actions/cache/restore@v4
        with:
          path: &package-cache-path |
            Packages/*
          key: packages-${{ runner.os }}-${{ hashFiles('Packages.lua') }}
          restore-keys: |
            packages-${{ runner.os }}-

      - name: Fetch Packages
        if: steps.restore-cache-packages.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}
        run: |
          premake5 packages

      - name: Save Package Cache
        if: steps.restore-cache-packages.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: *package-cache-path
          key: ${{ steps.restore-cache-packages.outputs.cache-primary-key }}

      - name: Generate Solutions
        working-directory: ${{ github.workspace }}
        run: |
          premake5 ${{ env.visual_studio_version }} --workspace=oyl3d --cc=${{ env.toolset }} --no-premake-check

      - name: Build
        working-directory: ${{ github.workspace }}
        run: >
          msbuild
          /maxCpuCount
          /property:Configuration=${{ matrix.configuration }}
          /property:Platform=${{ matrix.platform }}
          /verbosity:minimal
          ${{ env.solution_file_path }}

  win64-msvc:
    name: MSVC Oyl3D ${{ matrix.platform }} in ${{ matrix.configuration }}
    runs-on: windows-latest
    strategy: *build-strategy
    env:
      toolset: msc-v143
    steps: *win64-build-steps