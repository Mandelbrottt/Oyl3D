name: Build Clang

on:
  push: # temporary
  workflow_dispatch:
    inputs:
      llvm-ref:
        description: 'LLVM Commit Hash or Tag'
        required: false
        default: llvmorg-19.1.7
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Clang@${{ inputs.llvm-ref }}
    runs-on: windows-latest
    env:
      llvm-checkout-dir: ".llvm"
      llvm-build-dir: build
      llvm-install-dir: install
      llvm-archive: llvm.txz
    steps:
      - uses: actions/checkout@v6
        with:
          repository: llvm/llvm-project
          path: ${{ env.llvm-checkout-dir }}
          ref: ${{ inputs.llvm-ref }}
          
      - name: Set up MinGW
        if: ${{ !env.ACT }}
        uses: egor-tensin/setup-mingw@v3
          
      - name: CMake Generate Makefiles
        working-directory: ${{ env.llvm-checkout-dir }}
        run: >
          cmake
          -S llvm
          -B ${{ env.llvm-build-dir }}
          -G "MinGW Makefiles"
          -D CMAKE_BUILD_TYPE=Release
          -D LLVM_ENABLE_PROJECTS="clang;lld"
          -D LLVM_TARGETS_TO_BUILD="X86"
          -D LLVM_BUILD_LLVM_DYLIB=ON
          -D LLVM_LINK_LLVM_DYLIB=ON
          -D LLVM_ENABLE_PLUGINS=ON
          -D LLVM_ENABLE_ZLIB=OFF
          -D LLVM_ENABLE_ZSTD=OFF
          -D LLVM_DEFAULT_TARGET_TRIPLE="x86_64-pc-windows-msvc"

      - name: CMake Build Clang
        working-directory: ${{ env.llvm-checkout-dir }}
        run: cmake --build ${{ env.llvm-build-dir }} -j $NUMBER_OF_PROCESSORS

      - name: CMake Build Clang
        working-directory: ${{ env.llvm-checkout-dir }}
        run: cmake --install ${{ env.llvm-build-dir }} --prefix ${{ env.llvm-install-dir }}

      - name: Post-Process Install Directory
        working-directory: ${{ env.llvm-checkout-dir }}/${{ env.llvm-install-dir }}
        run: |
          # Remove unnecessary binaries
          rm bin/bugpoint.exe
          rm bin/c-index-test.exe
          rm bin/llvm-exegesis.exe

          # find all files in lib/ that don't have .dll.a in them, and remove them
          find lib -name "*.a" -type f |
          grep -v .dll.a |
          tr "\n" "\0" |
          xargs -0 -n 1 rm
          
          # Check all bins for mingw deps, and copy them over
          find bin -name '*.exe' -type f -print0 -o -name '*.dll' -type f -print0 |
          xargs -0 -n 1 ldd |
          grep -i mingw |
          sed -r 's/.+\.dll\s*=>\s*//i' | # Remove leading dll name
          sed -r 's/\s*\(.*\)//i' | # Remove trailing load address
          sort | uniq | # Filter list to only unique paths
          tr '\n' '\0' |
          xargs -0 -Ix cp x ./bin/ # Copy the files

      - name: Zip install directory
        working-directory: ${{ github.workspace }}
        run: >
          tar
          -cC ${{ env.llvm-checkout-dir }}/${{ env.llvm-install-dir }}
          -I 'xz -T$NUMBER_OF_PROCESSORS'
          -f ${{ env.llvm-archive }}
          .

      - name: Setup Rclone
        if: ${{ !env.ACT }}
        uses: AnimMouse/setup-rclone@v1.12.0
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Upload LLVM Artifact
        if: ${{ !env.ACT }}
        run: |
          rclone copyto ${{ env.llvm-archive }} oyl3d:llvm/${{ env.llvm-archive }}

      # - name: Update Rclone config
      #   if: ${{ !env.ACT }}
      #   uses: AnimMouse/setup-rclone/update-config@v1
      #   with:
      #     rclone_config_secret_name: RCLONE_CONFIG
      #     token: ${{ secrets.GH_PAT_RCLONE }}